services:
  brain-api:
    build:
      context: ..
      dockerfile: docker/brain-api.Dockerfile
    environment:
      MAB_NODE_ENV: development
      MAB_VAULT_ROOT: /data/vault/canonical
      MAB_STAGING_ROOT: /data/vault/staging
      MAB_SQLITE_PATH: /data/state/multi-agent-brain.sqlite
      MAB_QDRANT_URL: http://qdrant:6333
      MAB_QDRANT_COLLECTION: context_brain_chunks
      MAB_EMBEDDING_PROVIDER: hash
      MAB_REASONING_PROVIDER: heuristic
      MAB_DRAFTING_PROVIDER: disabled
      MAB_RERANKER_PROVIDER: local
      MAB_API_HOST: 0.0.0.0
      MAB_API_PORT: 8080
      MAB_LOG_LEVEL: info
    ports:
      - "8080:8080"
    volumes:
      - mab_canonical_vault:/data/vault/canonical
      - mab_staging_vault:/data/vault/staging
      - mab_state:/data/state
    depends_on:
      - qdrant
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - mab_qdrant_storage:/qdrant/storage

volumes:
  mab_canonical_vault:
  mab_staging_vault:
  mab_state:
  mab_qdrant_storage:
