intents:
  core-dev:
    displayName: Core Development
    summary: Safe local repository work with write access and internal memory tools.
    exampleTasks:
      - Inspect and edit code inside the current workspace
      - Draft or update repo-local implementation notes
    targetProfile: core-dev
    trustClass: local-readwrite
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: bootstrap
  docs-research:
    displayName: Docs Research
    summary: External docs, web search, and GitHub read for implementation research.
    exampleTasks:
      - Compare upstream docs with the current implementation
      - Look up Docker or Microsoft Learn guidance before changing code
    targetProfile: docs-research
    trustClass: external-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - local-docs
      - internal-memory
      - docs-search
      - web-search
      - github-read
      - container-registry-read
      - repo-knowledge-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev
  core-dev+docs-research:
    displayName: Core Dev Plus Docs Research
    summary: Code changes that also need external documentation and GitHub read context.
    exampleTasks:
      - Implement a fix while checking upstream docs
      - Refactor code and confirm behavior against API references
    targetProfile: core-dev+docs-research
    trustClass: external-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
      - docs-search
      - web-search
      - github-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev
  core-dev+voltagent-docs:
    displayName: Core Dev Plus VoltAgent Docs
    summary: Optional development-only VoltAgent docs convenience. Codex and Claude keep their own skills, subagents, and paid-agent quality outside Mimir.
    exampleTasks:
      - Check upstream VoltAgent docs while patching the current repository
      - Confirm VoltAgent API behavior without routing Codex or Claude skills through Mimir
    targetProfile: core-dev+voltagent-docs
    trustClass: external-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
      - docs-search
      - web-search
      - github-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev+docs-research
  core-dev+voltagent-dev:
    displayName: Core Dev Plus VoltAgent Docs (Legacy Alias)
    summary: Legacy alias for the optional development-only VoltAgent docs toolbox. Prefer `core-dev+voltagent-docs` for new automation and operator workflows.
    exampleTasks:
      - Migrate older automation or operator workflows onto the canonical VoltAgent docs toolbox id
      - Reuse the old VoltAgent docs toolbox id without routing Codex or Claude skills through Mimir
    targetProfile: core-dev+voltagent-docs
    trustClass: external-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
      - docs-search
      - web-search
      - github-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev+docs-research
  runtime-observe:
    displayName: Runtime Observe
    summary: Read-only runtime inspection across logs, metrics, traces, Docker, and Kubernetes state.
    exampleTasks:
      - Investigate service startup failures from logs, metrics, and cluster events
      - Inspect live container and pod state without mutating runtime resources
    targetProfile: runtime-observe
    trustClass: ops-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - internal-memory
      - logs-read
      - metrics-read
      - traces-read
      - docker-read
      - k8s-read
      - k8s-logs-read
      - k8s-events-read
    deniedCategories:
      - docker-write
      - deployment
    fallbackProfile: core-dev
  core-dev+runtime-observe:
    displayName: Core Dev Plus Runtime Observe
    summary: Repo changes that also require read-only runtime debugging context.
    exampleTasks:
      - Fix an incident by inspecting logs and editing code in the same session
      - Compare runtime traces with the current implementation before patching
    targetProfile: core-dev+runtime-observe
    trustClass: ops-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
      - logs-read
      - metrics-read
      - traces-read
      - docker-read
      - k8s-read
      - k8s-logs-read
      - k8s-events-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: runtime-observe
  runtime-admin:
    displayName: Runtime Admin
    summary: Runtime mutation tools for approved operator workflows on live systems.
    exampleTasks:
      - Restart a misbehaving container after approval
      - Run approved destructive runtime diagnostics
    targetProfile: runtime-admin
    trustClass: ops-mutate
    requiresApproval: true
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - internal-memory
      - logs-read
      - metrics-read
      - traces-read
      - docker-read
      - k8s-read
      - k8s-logs-read
      - k8s-events-read
      - docker-write
    deniedCategories:
      - deployment
    fallbackProfile: runtime-observe
  heavy-rag:
    displayName: Heavy RAG
    summary: Retrieval-heavy internal workflows that need model inference and memory writes.
    exampleTasks:
      - Build a large internal retrieval context before synthesis
      - Run memory-intensive analysis that exceeds the default coding toolbox
    targetProfile: heavy-rag
    trustClass: local-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - internal-memory
      - internal-memory-write
      - model-inference
    deniedCategories:
      - docker-write
      - deployment
    fallbackProfile: core-dev
  security-audit:
    displayName: Security Audit
    summary: Read-only security scanning and static analysis for repository audit work.
    exampleTasks:
      - Run a read-only Semgrep audit before release
      - Inspect static-analysis findings without mutating source or deployment state
    targetProfile: security-audit
    trustClass: external-read
    requiresApproval: false
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - local-docs
      - internal-memory
      - security-scan-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev
  delivery-admin:
    displayName: Delivery Admin
    summary: Approved delivery and publishing workflows that mutate external systems.
    exampleTasks:
      - Publish a release artifact after operator approval
      - Perform a deployment or GitHub write action tied to delivery
    targetProfile: delivery-admin
    trustClass: operator-only
    requiresApproval: true
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - github-write
      - docker-write
      - deployment
    deniedCategories: []
    fallbackProfile: runtime-admin
  full:
    displayName: Full Access
    summary: Operator-only emergency toolbox with the full curated capability surface.
    exampleTasks:
      - Handle an incident that spans delivery, runtime mutation, and repo changes
      - Run a tightly supervised end-to-end recovery workflow
    targetProfile: full
    trustClass: operator-only
    requiresApproval: true
    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
      - docs-search
      - web-search
      - github-read
      - github-write
      - logs-read
      - metrics-read
      - traces-read
      - docker-read
      - k8s-read
      - k8s-logs-read
      - k8s-events-read
      - docker-write
      - model-inference
      - deployment
      - container-registry-read
      - repo-knowledge-read
      - security-scan-read
    deniedCategories: []
    fallbackProfile: delivery-admin
