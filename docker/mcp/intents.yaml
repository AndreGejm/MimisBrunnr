    activationMode: session-switch
    allowedCategories:
      - repo-read
      - repo-write
      - local-docs
      - internal-memory
      - internal-memory-write
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: bootstrap
  docs-research:
