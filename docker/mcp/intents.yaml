      - repo-read
      - local-docs
      - internal-memory
      - docs-search
      - web-search
      - github-read
      - container-registry-read
    deniedCategories:
      - github-write
      - docker-write
      - deployment
    fallbackProfile: core-dev
  runtime-observe:
