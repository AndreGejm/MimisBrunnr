band:
  id: runtime-observe
  displayName: Runtime Observe
  trustClass: ops-read
  mutationLevel: read
  autoExpand: true
  requiresApproval: false
  includeServers:
    - mimir-control
    - mimir-core
    - grafana-observe
    - docker-read
    - kubernetes-read
  allowedCategories:
    - repo-read
    - internal-memory
    - logs-read
    - metrics-read
    - traces-read
    - docker-read
    - k8s-read
    - k8s-logs-read
    - k8s-events-read
  deniedCategories:
    - github-write
    - docker-write
    - deployment
  contraction:
    taskAware: true
    idleTimeoutSeconds: 900
    onLeaseExpiry: true
