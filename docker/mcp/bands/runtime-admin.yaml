band:
  id: runtime-admin
  displayName: Runtime Admin
  trustClass: ops-mutate
  mutationLevel: admin
  autoExpand: false
  requiresApproval: true
  includeServers:
    - mimir-control
    - mimir-core
    - grafana-observe
    - docker-read
    - kubernetes-read
    - docker-admin
  allowedCategories:
    - repo-read
    - internal-memory
    - logs-read
    - metrics-read
    - traces-read
    - docker-read
    - k8s-read
    - k8s-logs-read
    - k8s-events-read
    - docker-write
  deniedCategories:
    - deployment
  contraction:
    taskAware: true
    idleTimeoutSeconds: 600
    onLeaseExpiry: true
