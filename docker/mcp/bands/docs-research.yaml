band:
  id: docs-research
  displayName: Docs Research
  trustClass: external-read
  mutationLevel: read
  autoExpand: true
  requiresApproval: false
  includeServers:
    - mimir-control
    - mimir-core
    - github-read
    - brave-search
    - docker-docs
    - microsoft-learn
    - dockerhub-read
    - deepwiki-read
  allowedCategories:
    - repo-read
    - local-docs
    - internal-memory
    - docs-search
    - web-search
    - github-read
    - container-registry-read
    - repo-knowledge-read
  deniedCategories:
    - github-write
    - docker-write
    - deployment
  contraction:
    taskAware: true
    idleTimeoutSeconds: 1200
    onLeaseExpiry: true
