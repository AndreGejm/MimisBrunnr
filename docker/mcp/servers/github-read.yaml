server:
  id: github-read
  displayName: GitHub Read
  source: peer
  kind: peer
  trustClass: external-read
  mutationLevel: read
  dockerRuntime:
    applyMode: descriptor-only
    blockedReason: >-
      github-read is a descriptor-only read-filtered surface. The live GitHub
      Docker MCP catalog server bundles write capabilities; a read-only catalog
      entry must be published before this server can appear in catalog profiles.
  tools:
    - toolId: github.search
      displayName: Search GitHub
      category: github-read
      trustClass: external-read
      mutationLevel: read
      semanticCapabilityId: github.search
    - toolId: github.pull_request.read
      displayName: Read Pull Request
      category: github-read
      trustClass: external-read
      mutationLevel: read
      semanticCapabilityId: github.pull-request.read
