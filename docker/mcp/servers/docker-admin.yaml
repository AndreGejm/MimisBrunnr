server:
  id: docker-admin
  displayName: Docker Admin
  source: peer
  kind: peer
  trustClass: ops-mutate
  mutationLevel: admin
  dockerRuntime:
    applyMode: descriptor-only
    blockedReason: >-
      docker-admin is a descriptor-only surface. The live Docker catalog
      admin server must be separately vetted and approved before it can be
      referenced in catalog profiles.
  tools:
    - toolId: docker.restart
      displayName: Restart Container
      category: docker-write
      trustClass: ops-mutate
      mutationLevel: admin
      semanticCapabilityId: docker.runtime.restart
