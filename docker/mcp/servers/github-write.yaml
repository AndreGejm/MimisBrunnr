server:
  id: github-write
  displayName: GitHub Write
  source: peer
  kind: peer
  trustClass: external-readwrite
  mutationLevel: write
  dockerRuntime:
    applyMode: descriptor-only
    blockedReason: >-
      github-write is a descriptor-only surface exposing write capabilities.
      This server must not be emitted as a raw catalog profile reference until
      a properly scoped and audited catalog entry is available.
  tools:
    - toolId: github.issue.comment
      displayName: Comment On Issue
      category: github-write
      trustClass: external-readwrite
      mutationLevel: write
      semanticCapabilityId: github.issue.comment
    - toolId: github.pull_request.review
      displayName: Review Pull Request
      category: github-write
      trustClass: external-readwrite
      mutationLevel: write
      semanticCapabilityId: github.pull-request.review
