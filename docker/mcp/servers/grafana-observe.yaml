server:
  id: grafana-observe
  displayName: Grafana Observe
  source: peer
  kind: peer
  trustClass: ops-read
  mutationLevel: read
  dockerRuntime:
    applyMode: descriptor-only
    blockedReason: >
      Live Docker MCP catalog server 'grafana' currently exposes mutating/destructive tools
      (for example alerting_manage_rules, update_dashboard, create_*). Use descriptor-only
      policy until a read-filtered Grafana wrapper/catalog entry is available.
    unsafeCatalogServerIds:
      - grafana
  tools:
    - toolId: grafana.logs.query
      displayName: Query Logs
      category: logs-read
      trustClass: ops-read
      mutationLevel: read
      semanticCapabilityId: observe.logs.query
    - toolId: grafana.metrics.query
      displayName: Query Metrics
      category: metrics-read
      trustClass: ops-read
      mutationLevel: read
      semanticCapabilityId: observe.metrics.query
    - toolId: grafana.traces.query
      displayName: Query Traces
      category: traces-read
      trustClass: ops-read
      mutationLevel: read
      semanticCapabilityId: observe.traces.query
