server:
  id: docker-read
  displayName: Docker Read
  source: peer
  kind: peer
  trustClass: ops-read
  mutationLevel: read
  dockerRuntime:
    applyMode: descriptor-only
    blockedReason: >-
      The docker-read surface is a descriptor-only read-filtered wrapper.
      No standalone read-only Docker runtime catalog entry exists; the live
      catalog server includes mutation capabilities and cannot be safely
      referenced for read-only profiles.
  tools:
    - toolId: docker.inspect
      displayName: Inspect Docker Runtime
      category: docker-read
      trustClass: ops-read
      mutationLevel: read
      semanticCapabilityId: docker.runtime.inspect
