name: voltagent-contracts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/voltagent-contracts.yml"
      - ".github/dependabot.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/**"
      - "tests/e2e/config-boundaries.test.mjs"
      - "tests/e2e/local-model-providers.test.mjs"
      - "tests/e2e/coding-advisory-transport-parity.test.mjs"
      - "tests/e2e/toolbox-manifest-contracts.test.mjs"
      - "tests/e2e/toolbox-cli.test.mjs"
      - "docker/mcp/**"
      - "documentation/reference/env-vars.md"
      - "documentation/setup/configuration.md"
      - "documentation/operations/running.md"
      - "documentation/operations/docker-toolbox-v1.md"
      - "documentation/operations/voltagent-runtime.md"
      - ".env.example"
  push:
    branches:
      - main
      - feature/voltagent-seams
    paths:
      - ".github/workflows/voltagent-contracts.yml"
      - ".github/dependabot.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/**"
      - "tests/e2e/config-boundaries.test.mjs"
      - "tests/e2e/local-model-providers.test.mjs"
      - "tests/e2e/coding-advisory-transport-parity.test.mjs"
      - "tests/e2e/toolbox-manifest-contracts.test.mjs"
      - "tests/e2e/toolbox-cli.test.mjs"
      - "docker/mcp/**"
      - "documentation/reference/env-vars.md"
      - "documentation/setup/configuration.md"
      - "documentation/operations/running.md"
      - "documentation/operations/docker-toolbox-v1.md"
      - "documentation/operations/voltagent-runtime.md"
      - ".env.example"

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:voltagent-contracts

  smoke:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:voltagent-smoke
